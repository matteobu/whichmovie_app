{% extends "base.html" %}

{% block title %}Password Reset Complete - WhichMovie{% endblock %}

{% block extra_styles %}
<style>
    main {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 150px);
        padding: 2rem;
    }
    .auth-container {
        background: rgba(255,255,255,0.05);
        border-radius: 16px;
        padding: 2.5rem;
        width: 100%;
        max-width: 400px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.1);
        text-align: center;
    }
    .auth-container h1 {
        margin-bottom: 0.5rem;
    }
    .auth-container h1 span {
        color: #e94560;
    }
    .message {
        color: rgba(255,255,255,0.6);
        margin-bottom: 2rem;
        line-height: 1.6;
    }
    .auth-btn {
        display: inline-block;
        padding: 0.875rem 2rem;
        background: #e94560;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .auth-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        text-decoration: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>Password <span>Changed!</span></h1>
    <p class="message">
        Your password has been successfully reset.
        You can now log in with your new password.
    </p>
    <a href="{% url 'account_login' %}" class="auth-btn">Go to Login</a>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}WhichMovie - Discover Curated Films{% endblock %}

{% block extra_styles %}
<style>
    .hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 4rem 2rem;
        min-height: 80vh;
    }
    .hero h1 {
        font-size: 3.5rem;
        margin-bottom: 1rem;
    }
    .hero h1 span {
        color: #e94560;
    }
    .hero p {
        font-size: 1.25rem;
        color: rgba(255,255,255,0.7);
        margin-bottom: 2rem;
        max-width: 500px;
    }
    .cta-button {
        display: inline-block;
        background: #e94560;
        color: #fff;
        text-decoration: none;
        padding: 1rem 2.5rem;
        border-radius: 50px;
        font-size: 1.1rem;
        font-weight: 600;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .cta-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        text-decoration: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="hero">
    <h1>Which<span>Movie</span>?</h1>
    <p>Discover curated films from the best streaming platforms. Find your next favorite movie.</p>
    <a href="{% url 'movie_list' %}" class="cta-button">Browse Movies</a>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WhichMovie{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        a {
            color: #e94560;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }

        /* Header */
        .site-header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .site-logo {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .site-logo a {
            color: #fff;
            text-decoration: none;
        }
        .site-logo span {
            color: #e94560;
        }
        .site-nav {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .site-nav a {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            transition: color 0.2s;
            text-decoration: none;
        }
        .site-nav a:hover {
            color: #fff;
            text-decoration: none;
        }
        .nav-user {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .nav-user span {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }
        .nav-btn {
            padding: 0.4rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .nav-btn-primary {
            background: #e94560;
            color: #fff !important;
        }
        .nav-btn-primary:hover {
            background: #ff6b6b;
        }
        .nav-btn-logout {
            background: none;
            border: none;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0.4rem 0.75rem;
        }
        .nav-btn-logout:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
        }

        /* Footer */
        .site-footer {
            text-align: center;
            padding: 2rem;
            color: rgba(255,255,255,0.4);
            font-size: 0.875rem;
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="site-logo">
            <a href="{% url 'home' %}">Which<span>Movie</span></a>
        </div>
        <nav class="site-nav">
            <a href="{% url 'movie_list' %}">Browse</a>
            {% if user.is_authenticated %}
            <div class="nav-user">
                <a href="{% url 'profile' %}">{{ user.username }}</a>
                <form method="post" action="{% url 'account_logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="nav-btn-logout">Logout</button>
                </form>
            </div>
            {% else %}
            <a href="{% url 'account_login' %}">Login</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        &copy; 2025 WhichMovie
    </footer>
</body>
</html>
